<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 浅色柔和背景 -->
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FAFBFF"/>
      <stop offset="0.6" stop-color="#F5F3FF"/>
      <stop offset="1" stop-color="#EDE9FE"/>
    </linearGradient>
    
    <!-- 胶囊上半部分 -->
    <linearGradient id="capTop" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop stop-color="#818CF8"/>
      <stop offset="1" stop-color="#6366F1"/>
    </linearGradient>
    
    <!-- 胶囊下半部分 -->
    <linearGradient id="capBottom" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop stop-color="#7C3AED"/>
      <stop offset="1" stop-color="#6D28D9"/>
    </linearGradient>
    
    <!-- 高光 -->
    <linearGradient id="shine" x1="0" y1="0" x2="0.3" y2="1" gradientUnits="objectBoundingBox">
      <stop stop-color="#FFF" stop-opacity="0.5"/>
      <stop offset="0.6" stop-color="#FFF" stop-opacity="0"/>
    </linearGradient>
    
    <!-- 光点 -->
    <radialGradient id="orbGlow" cx="50%" cy="50%" r="50%">
      <stop stop-color="#E0E7FF" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#E0E7FF" stop-opacity="0"/>
    </radialGradient>
    
    <radialGradient id="coreLight" cx="40%" cy="35%" r="50%">
      <stop stop-color="#FFF"/>
      <stop offset="1" stop-color="#C7D2FE"/>
    </radialGradient>
    
    <!-- 柔和阴影 -->
    <filter id="dropShadow" x="-15%" y="-5%" width="130%" height="135%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="16"/>
      <feOffset dx="0" dy="12"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.08"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- 光晕 -->
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="14" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- 装饰点模糊 -->
    <filter id="dotGlow" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>
  
  <!-- 圆角方形背景 -->
  <rect width="512" height="512" rx="116" fill="url(#bg)"/>
  
  <!-- 背景装饰圆环 -->
  <circle cx="256" cy="256" r="185" stroke="#C7D2FE" stroke-width="0.8" fill="none" opacity="0.25"/>
  <circle cx="256" cy="256" r="155" stroke="#DDD6FE" stroke-width="0.6" fill="none" opacity="0.18"/>
  
  <!-- ========== 胶囊主体 ========== -->
  <g filter="url(#dropShadow)">
    <g transform="translate(256,256) rotate(-30) translate(-256,-256)">
      
      <!-- 胶囊完整路径：
           上半圆: 顶部 (256,138), 宽112, 高56
           矩形连接
           下半圆 -->
      
      <!-- 上半部（亮色） -->
      <path d="
        M 200,256
        L 200,216
        C 200,174.9 224.9,150 256,150
        C 287.1,150 312,174.9 312,216
        L 312,256
        Z
      " fill="url(#capTop)"/>
      
      <!-- 下半部（深色） -->
      <path d="
        M 200,256
        L 200,296
        C 200,337.1 224.9,362 256,362
        C 287.1,362 312,337.1 312,296
        L 312,256
        Z
      " fill="url(#capBottom)"/>
      
      <!-- 中间分隔线 -->
      <line x1="202" y1="256" x2="310" y2="256" stroke="rgba(255,255,255,0.3)" stroke-width="1.8" stroke-linecap="round"/>
      
      <!-- 左侧高光 -->
      <path d="
        M 210,174
        C 196,192 190,214 190,236
        L 190,244
        C 206,222 218,198 224,180
        Z
      " fill="url(#shine)" opacity="0.55"/>
      
      <!-- 轻微内发光（上半部） -->
      <ellipse cx="256" cy="210" rx="36" ry="30" fill="white" opacity="0.06"/>
      
    </g>
  </g>
  
  <!-- ========== 中心灵感光点 ========== -->
  <!-- 外层光晕 -->
  <g transform="rotate(-30 256 256)">
    <circle cx="256" cy="216" r="32" fill="url(#orbGlow)" filter="url(#glow)"/>
  </g>
  
  <!-- 核心亮点 -->
  <g transform="rotate(-30 256 256)">
    <circle cx="256" cy="216" r="9" fill="url(#coreLight)" opacity="0.95"/>
    <circle cx="254" cy="214" r="3.5" fill="white" opacity="0.9"/>
  </g>
  
  <!-- ========== 装饰元素 ========== -->
  <!-- 散落灵感小点 -->
  <circle cx="170" cy="162" r="3.5" fill="#818CF8" opacity="0.35"/>
  <circle cx="170" cy="162" r="8" fill="#818CF8" opacity="0.08" filter="url(#dotGlow)"/>
  
  <circle cx="340" cy="178" r="2.8" fill="#A78BFA" opacity="0.3"/>
  <circle cx="340" cy="178" r="7" fill="#A78BFA" opacity="0.06" filter="url(#dotGlow)"/>
  
  <circle cx="152" cy="318" r="2.2" fill="#818CF8" opacity="0.25"/>
  
  <circle cx="360" cy="332" r="3" fill="#A78BFA" opacity="0.22"/>
  <circle cx="360" cy="332" r="7" fill="#A78BFA" opacity="0.06" filter="url(#dotGlow)"/>
  
  <circle cx="220" cy="386" r="2" fill="#C4B5FD" opacity="0.25"/>
  <circle cx="305" cy="142" r="2.2" fill="#C4B5FD" opacity="0.3"/>
  
  <!-- 微型十字星芒 -->
  <g transform="translate(332 152)" opacity="0.4">
    <line x1="0" y1="-6" x2="0" y2="6" stroke="#7C3AED" stroke-width="1.4" stroke-linecap="round"/>
    <line x1="-6" y1="0" x2="6" y2="0" stroke="#7C3AED" stroke-width="1.4" stroke-linecap="round"/>
  </g>
  
  <g transform="translate(164 348)" opacity="0.25">
    <line x1="0" y1="-4.5" x2="0" y2="4.5" stroke="#6366F1" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="-4.5" y1="0" x2="4.5" y2="0" stroke="#6366F1" stroke-width="1.2" stroke-linecap="round"/>
  </g>
  
  <g transform="translate(370 260)" opacity="0.2">
    <line x1="0" y1="-3.5" x2="0" y2="3.5" stroke="#818CF8" stroke-width="1" stroke-linecap="round"/>
    <line x1="-3.5" y1="0" x2="3.5" y2="0" stroke="#818CF8" stroke-width="1" stroke-linecap="round"/>
  </g>
</svg>
