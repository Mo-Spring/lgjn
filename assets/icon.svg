<svg width="512" height="512" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1e293b"/>
      <stop offset="1" stop-color="#312e81"/>
    </linearGradient>
    <linearGradient id="capsule-grad" x1="50" y1="20" x2="50" y2="80" gradientUnits="userSpaceOnUse">
      <stop stop-color="rgba(255,255,255,0.15)"/>
      <stop offset="1" stop-color="rgba(255,255,255,0.05)"/>
    </linearGradient>
    <radialGradient id="orb-grad" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(50 50) rotate(90) scale(18)">
      <stop stop-color="#f472b6"/>
      <stop offset="1" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="100" height="100" rx="22" fill="url(#bg-grad)"/>
  
  <g transform="rotate(-30 50 50)">
    <path 
      d="M 50,22 C 37.849,22 28,31.849 28,44 L 28,56 C 28,68.151 37.849,78 50,78 C 62.151,78 72,68.151 72,56 L 72,44 C 72,31.849 62.151,22 50,22 Z" 
      fill="url(#capsule-grad)" 
      stroke="rgba(255,255,255,0.2)" 
      stroke-width="1.5"
    />
    <ellipse cx="50" cy="50" rx="12" ry="12" fill="url(#orb-grad)" filter="url(#glow)"/>
  </g>
</svg>
